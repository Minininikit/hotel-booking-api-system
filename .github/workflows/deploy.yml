name: Deploy Zudoku Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: |
          cd docs-site
          npm install

      - name: Build Site with Zudoku
        run: |
          cd docs-site
          npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist/hotel-booking-api-system
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4